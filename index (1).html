<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ANVI Navigation Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
  <style>
    :root{--green:#00c853;--amber:#ffab00;--red:#d50000;--blue:#2962ff;}
    *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
    body{
      background:#000;color:#fff;
      font-family:'Segoe UI',Arial,sans-serif;
      height:100vh;width:100vw;overflow:hidden;
      display:flex;flex-direction:column;user-select:none;
    }

    /* ══ TOUCH ZONE ══ */
    #touchZone{
      flex:1;display:flex;flex-direction:column;
      align-items:flex-start;justify-content:flex-start;
      width:100%;padding:16px;gap:10px;transition:background 0.4s;
    }
    #touchZone.clear    {background:radial-gradient(ellipse at center,#071a0c 0%,#000 100%);}
    #touchZone.warning  {background:radial-gradient(ellipse at center,#1e1400 0%,#000 100%);}
    #touchZone.emergency{background:radial-gradient(ellipse at center,#1a0000 0%,#000 100%);animation:blink .5s infinite alternate;}
    #touchZone.finding  {background:radial-gradient(ellipse at center,#001433 0%,#000 100%);animation:blink .8s infinite alternate;}
    #touchZone.idle     {background:#000;}
    @keyframes blink{from{opacity:1}to{opacity:.6}}

    /* ══ ANIMATED ORBS (replaces emoji icon) ══ */
    #orbWrap{
      position:relative;
      width:100px;height:100px;
      display:flex;align-items:center;justify-content:center;
      margin-top:10px;margin-left:8px;
    }

    /* Outer ring — always visible */
    #orbRing{
      position:absolute;
      width:120px;height:120px;border-radius:50%;
      border:2px solid rgba(0,200,83,0.3);
      animation:ringRotate 8s linear infinite;
    }
    @keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* Middle pulse ring */
    #orbPulse{
      position:absolute;
      width:90px;height:90px;border-radius:50%;
      border:1.5px solid rgba(0,200,83,0.15);
    }
    #orbPulse.active{
      animation:pulseRing 1s ease-out infinite;
    }
    @keyframes pulseRing{
      0%  {transform:scale(1);  opacity:.5;}
      100%{transform:scale(1.5);opacity:0;}
    }

    /* Inner core circle — main visual */
    #orbCore{
      position:relative;
      width:70px;height:70px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #00e676, #00c853, #005724);
      box-shadow:0 0 20px rgba(0,200,83,0.5);
      display:flex;align-items:center;justify-content:center;
      transition:all 0.3s;
      z-index:2;
    }
    #orbCore.warning  {background:radial-gradient(circle at 35% 35%,#ffd740,#ffab00,#ff6f00);box-shadow:0 0 20px rgba(255,171,0,0.6);}
    #orbCore.emergency{background:radial-gradient(circle at 35% 35%,#ff5252,#d50000,#7f0000);box-shadow:0 0 25px rgba(213,0,0,0.7);}
    #orbCore.finding  {background:radial-gradient(circle at 35% 35%,#80d8ff,#40c4ff,#006064);box-shadow:0 0 20px rgba(64,196,255,0.6);}
    #orbCore.speaking {animation:speakBounce 0.4s ease-in-out infinite alternate;}
    @keyframes speakBounce{
      from{transform:scale(1);}
      to  {transform:scale(1.15);}
    }



    /* Floating dots around ring when speaking */
    .orbDot{
      position:absolute;
      width:7px;height:7px;border-radius:50%;
      background:var(--green);opacity:0;
      transition:opacity 0.3s;
    }
    .orbDot.d1{top:4px; left:50%;transform:translateX(-50%);}
    .orbDot.d2{bottom:4px;left:50%;transform:translateX(-50%);}
    .orbDot.d3{left:4px; top:50%;transform:translateY(-50%);}
    .orbDot.d4{right:4px;top:50%;transform:translateY(-50%);}
    #orbWrap.speaking .orbDot{opacity:1;animation:dotPulse 0.6s ease-in-out infinite alternate;}
    @keyframes dotPulse{from{opacity:.3;transform:scale(0.8) translateX(-50%);}to{opacity:1;transform:scale(1.2) translateX(-50%);}}

    #statusText{
      font-size:22px;font-weight:bold;
      text-align:left;line-height:1.3;
      letter-spacing:.5px;
      margin-left:8px;
    }
    #subText{font-size:14px;color:#aaa;text-align:left;line-height:1.5;max-width:300px;
      margin-left:8px;}

    /* ══ DETECTION CARDS ══ */
    #detCards{
      display:flex;flex-direction:column;gap:6px;
      width:100%;max-width:380px;max-height:130px;
      overflow-y:auto;margin-left:8px;
    }
    .detCard{
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,0.05);
      border-radius:10px;padding:8px 14px;
      border-left:4px solid var(--green);
      animation:slideIn .25s ease;
      font-size:13px;
    }
    .detCard.danger {border-left-color:var(--red);}
    .detCard.caution{border-left-color:var(--amber);}
    .detCard .label{font-weight:600;}
    .detCard .dist {color:#aaa;font-size:12px;margin-left:8px;}
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

    /* ══ CAM PILL ══ */
    #camPill{
      display:flex;align-items:center;gap:8px;
      padding:6px 16px;border-radius:30px;
      background:rgba(255,255,255,0.05);
      border:1.5px solid #333;font-size:13px;
      font-weight:bold;transition:all 0.3s;
      margin-left:8px;
    }
    #camPill.off    {border-color:#444;color:#666;}
    #camPill.on     {border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(0,200,83,.25);}
    #camPill.loading{border-color:var(--amber);color:var(--amber);}
    .camDot{width:8px;height:8px;border-radius:50%;background:#444;}
    .camDot.on     {background:var(--green);animation:cp 1.5s infinite;}
    .camDot.loading{background:var(--amber);animation:cp .5s infinite;}
    @keyframes cp{0%,100%{opacity:1}50%{opacity:.3}}

    /* ══ HINT BAR ══ */
    #hintBar{
      background:#0a0a0a;border-top:1px solid #1a1a1a;
      padding:8px 16px;display:grid;
      grid-template-columns:1fr 1fr;gap:4px;
    }
    .hint{display:flex;align-items:center;gap:7px;font-size:11px;color:#444;padding:3px 0;}
    .hint span:first-child{font-size:14px;min-width:20px;text-align:center;}

    /* Camera hidden but in DOM */
    #videoWrap{
      position:fixed;bottom:55px;right:6px;
      width:64px;height:48px;border-radius:6px;
      overflow:hidden;border:1px solid #1a1a1a;
      z-index:5;pointer-events:none;
    }
    #videoWrap.hidden{opacity:0;}
    #video{width:100%;height:100%;object-fit:cover;display:block;}
    #canvas{position:fixed;opacity:0;width:1px;height:1px;top:-100px;}

    #pressRing{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:130px;height:130px;border-radius:50%;
      border:4px solid #40c4ff;opacity:0;pointer-events:none;
      animation:rp 1s infinite;
    }
    #pressRing.active{opacity:1;}
    @keyframes rp{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2);opacity:.3}}

    #muteIcon{position:fixed;top:12px;right:12px;font-size:20px;opacity:.5;}
    #connDot{
      position:fixed;top:16px;left:12px;
      width:11px;height:11px;border-radius:50%;
      background:#333;transition:background .3s;
    }
    #connDot.connected   {background:var(--green);box-shadow:0 0 6px var(--green);}
    #connDot.disconnected{background:#333;}
    #connDot.scanning    {background:var(--amber);box-shadow:0 0 6px var(--amber);}

    #errBox{
      display:none;position:fixed;bottom:60px;left:8px;right:8px;
      background:#1a0000;border:1px solid var(--red);border-radius:10px;
      padding:12px 14px;font-size:12px;color:#ff6b6b;
      line-height:1.6;z-index:20;white-space:pre-line;
    }
  </style>
</head>
<body>

<div id="videoWrap" class="hidden">
  <video id="video" autoplay playsinline muted></video>
</div>
<canvas id="canvas"></canvas>
<div id="connDot"></div>
<div id="muteIcon">🔊</div>
<div id="pressRing"></div>
<div id="errBox"></div>

<!-- ══ MAIN TOUCH ZONE ══ -->
<div id="touchZone" class="idle">

  <!-- Animated orb -->
  <div id="orbWrap">
    <div id="orbRing"></div>
    <div id="orbPulse"></div>
    <div class="orbDot d1"></div>
    <div class="orbDot d2"></div>
    <div class="orbDot d3"></div>
    <div class="orbDot d4"></div>
    <div id="orbCore"></div>
  </div>

  <div id="statusText">ANVI Navigation</div>
  <div id="subText">Tap to connect your cane</div>

  <div id="camPill" class="off">
    <div class="camDot" id="camDot"></div>
    <span id="camPillText">Camera OFF</span>
  </div>

  <!-- Detection cards -->
  <div id="detCards"></div>

</div>

<!-- ══ HINT BAR ══ -->
<div id="hintBar">
  <div class="hint"><span>👆</span><span>Tap — Connect / Status</span></div>
  <div class="hint"><span>👆👆</span><span>Double tap — Start camera</span></div>
  <div class="hint"><span>✋</span><span>Hold — Find cane</span></div>
  <div class="hint"><span>☝️↑</span><span>Swipe up — Mute / Unmute</span></div>
</div>

<script>
// ══════════════════════════════════════════════════
// BLE CONFIG
// ══════════════════════════════════════════════════
const SERVICE_UUID    = "12345678-1234-1234-1234-123456789abc";
const ALERT_CHAR_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";
const CMD_CHAR_UUID   = "dcba4321-ba21-ba21-ba21-fedcba654321";

// ══════════════════════════════════════════════════
// DETECTION CATEGORIES
// ══════════════════════════════════════════════════
const DANGER = [
  "person","bicycle","car","motorcycle",
  "bus","truck","dog","cat","horse","train"
];
const CAUTION = [
  "chair","couch","dining table","bench",
  "potted plant","suitcase","backpack",
  "umbrella","handbag","bottle",
  "fire hydrant","parking meter","clock",
  "vase","scissors","book","cell phone",
  "laptop","tv","refrigerator","sink","toilet"
];

// Estimated real-world heights (cm) for distance calculation
const REAL_HEIGHT_CM = {
  person:170, bicycle:100, car:150, motorcycle:110,
  bus:300, truck:280, dog:50, cat:25, horse:160,
  train:350, chair:90, couch:85, "dining table":75,
  bench:80, "potted plant":40, suitcase:65,
  backpack:50, umbrella:100, "fire hydrant":60,
  refrigerator:175, tv:60, laptop:30, toilet:70, sink:20
};
const FOCAL_LENGTH_PX = 600; // approximate focal length

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let alertChar=null,cmdChar=null,bleConnected=false;
let model=null,cameraOn=false,detecting=false;
let isFinding=false,muted=false;
let lastSpoken="",lastSpokenAt=0;
const COOLDOWN=4000;
let lastTap=0,tapTimeout=null,pressTimer=null,pressStart=0;
const LONG_PRESS=800;
let speakTimer=null;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

// ══════════════════════════════════════════════════
// ORB ANIMATION
// ══════════════════════════════════════════════════
function setOrbState(state){
  // state: idle | clear | warning | emergency | finding | speaking
  const core=document.getElementById("orbCore");
  const wrap=document.getElementById("orbWrap");
  const pulse=document.getElementById("orbPulse");
  core.className=state;
  wrap.className=state==="speaking"?"speaking":"";
  pulse.className=state==="speaking"||state==="clear"?"active":"";
}

function orbSpeak(){
  setOrbState("speaking");
  clearTimeout(speakTimer);
  // Stop speaking animation 500ms after speech ends
  speakTimer=setInterval(()=>{
    if(!window.speechSynthesis.speaking){
      setOrbState(currentZone());
      clearInterval(speakTimer);
    }
  },300);
}

function currentZone(){
  return document.getElementById("touchZone").className||"idle";
}

// ══════════════════════════════════════════════════
// ERROR BOX
// ══════════════════════════════════════════════════
function showErr(msg){
  const b=document.getElementById("errBox");
  b.textContent=msg; b.style.display="block";
  setTimeout(()=>{b.style.display="none";},9000);
}

// ══════════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════════
function speak(text,force=false){
  if(muted&&!force)return;
  const now=Date.now();
  if(!force&&text===lastSpoken&&now-lastSpokenAt<COOLDOWN)return;
  lastSpoken=text; lastSpokenAt=now;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.0; u.pitch=1.0; u.volume=1.0;
  u.onstart=()=>orbSpeak();
  u.onend=()=>setOrbState(currentZone());
  window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════
// DISTANCE ESTIMATION
// Returns distance in feet from bounding box height
// ══════════════════════════════════════════════════
function estimateDist(label, bboxH){
  const realH = REAL_HEIGHT_CM[label];
  if(!realH||bboxH<5)return null;
  const distCm = (realH * FOCAL_LENGTH_PX) / bboxH;
  const distFt = distCm / 30.48;
  return Math.round(distFt * 10) / 10; // 1 decimal place
}

function distLabel(ft){
  if(ft===null)return "";
  if(ft<1) return "less than 1 ft";
  if(ft<3) return ft+" ft — very close";
  if(ft<8) return ft+" ft — close";
  return ft+" ft";
}

// ══════════════════════════════════════════════════
// CAM PILL
// ══════════════════════════════════════════════════
function setCamPill(state){
  document.getElementById("camPill").className=state;
  document.getElementById("camDot").className="camDot "+state;
  const t=document.getElementById("camPillText");
  if(state==="on")     t.textContent="📷 Camera ON — AI Active";
  if(state==="off")    t.textContent="Camera OFF";
  if(state==="loading")t.textContent="Camera Loading...";
}

// ══════════════════════════════════════════════════
// STATUS READOUT
// ══════════════════════════════════════════════════
function readStatus(){
  let m="";
  m+=bleConnected?"Cane is connected. ":"Cane is not connected. ";
  m+=cameraOn?"Camera and AI detection are ON. ":"Camera is OFF. Double tap to start. ";
  m+=muted?"Voice is muted. Swipe up to unmute.":"Voice is on.";
  speak(m,true);
}

// ══════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════
function setUI(zone,title,sub){
  const tz=document.getElementById("touchZone");
  tz.className=zone;
  document.getElementById("statusText").textContent=title;
  document.getElementById("subText").textContent=sub;
  setOrbState(zone);
}

// ══════════════════════════════════════════════════
// GESTURES
// ══════════════════════════════════════════════════
const zone=document.getElementById("touchZone");
zone.addEventListener("touchstart",e=>{
  pressStart=Date.now();
  pressTimer=setTimeout(triggerLongPress,LONG_PRESS);
  document.getElementById("pressRing").classList.add("active");
},{passive:true});
zone.addEventListener("touchend",e=>{
  clearTimeout(pressTimer);
  document.getElementById("pressRing").classList.remove("active");
  if(Date.now()-pressStart>=LONG_PRESS)return;
  const now=Date.now();
  if(now-lastTap<350){clearTimeout(tapTimeout);lastTap=0;triggerDoubleTap();}
  else{lastTap=now;tapTimeout=setTimeout(()=>{lastTap=0;triggerSingleTap();},350);}
},{passive:true});
zone.addEventListener("touchmove",()=>{
  clearTimeout(pressTimer);
  document.getElementById("pressRing").classList.remove("active");
},{passive:true});

let touchStartY=0;
document.addEventListener("touchstart",e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{
  if(touchStartY-e.changedTouches[0].clientY>60)toggleMute();
},{passive:true});

function triggerSingleTap(){bleConnected?readStatus():connectBLE();}
function triggerDoubleTap(){
  cameraOn
    ?speak("Camera is already on and detecting. I will announce anything I see ahead.",true)
    :startCamera();
}
async function triggerLongPress(){
  if(!bleConnected){speak("Cane not connected. Tap once to connect first.",true);return;}
  isFinding=!isFinding;
  try{
    await cmdChar.writeValue(new TextEncoder().encode(isFinding?"FIND":"FIND_STOP"));
    if(isFinding){
      setUI("finding","Finding Cane...","Follow the beeping. Hold again to stop.");
      speak("Finding your cane. Follow the beeping. Hold anywhere to stop.",true);
    }else{
      setUI("clear","All Clear",cameraOn?"Camera detection active":"Safe to walk");
      speak("Find mode stopped. Cane is nearby.",true);
    }
  }catch(e){speak("Could not send find command.",true);}
}
function toggleMute(){
  muted=!muted;
  document.getElementById("muteIcon").textContent=muted?"🔇":"🔊";
  muted?window.speechSynthesis.cancel():speak("Voice is on",true);
}

// ══════════════════════════════════════════════════
// BLUETOOTH
// ══════════════════════════════════════════════════
async function connectBLE(){
  if(!navigator.bluetooth){speak("Bluetooth not supported. Please use Chrome on Android.",true);return;}
  try{
    setUI("idle","Scanning...","Looking for ANVI Cane");
    document.getElementById("connDot").className="scanning";
    speak("Scanning for your cane. Please wait.",true);
    const device=await navigator.bluetooth.requestDevice({
      filters:[{name:"ANVI Cane"}],optionalServices:[SERVICE_UUID]
    });
    speak("Cane found. Connecting.",true);
    const server=await device.gatt.connect();
    const service=await server.getPrimaryService(SERVICE_UUID);
    alertChar=await service.getCharacteristic(ALERT_CHAR_UUID);
    await alertChar.startNotifications();
    alertChar.addEventListener("characteristicvaluechanged",e=>{
      handleCaneAlert(new TextDecoder().decode(e.target.value));
    });
    cmdChar=await service.getCharacteristic(CMD_CHAR_UUID);
    bleConnected=true;
    document.getElementById("connDot").className="connected";
    setUI("clear","Cane Connected","Tap for status. Double tap to start camera.");
    speak("Cane connected and ready. Tap to hear your status. Double tap to start camera detection. Hold to find your cane. Swipe up to mute.",true);
    device.addEventListener("gattserverdisconnected",()=>{
      bleConnected=false;
      document.getElementById("connDot").className="disconnected";
      setUI("idle","Cane Disconnected","Tap to reconnect");
      speak("Cane disconnected. Tap to reconnect.",true);
    });
  }catch(e){
    document.getElementById("connDot").className="disconnected";
    setUI("idle","Connection Failed","Tap to try again");
    speak("Could not connect. Make sure cane is powered on, then tap to try again.",true);
  }
}

// ══════════════════════════════════════════════════
// CANE ALERTS
// ══════════════════════════════════════════════════
function handleCaneAlert(msg){
  if(isFinding)return;
  if(msg==="EMERGENCY"){
    setUI("emergency","STOP — Obstacle!","Stop walking immediately");
    speak("Obstacle! Stop now!",true);
  }else if(msg==="WARNING_CLOSE"){
    setUI("warning","Obstacle Very Close","Slow down");
    speak("Obstacle very close ahead");
  }else if(msg==="WARNING"){
    setUI("warning","Obstacle Ahead","Proceed carefully");
    speak("Obstacle ahead, slow down");
  }else if(msg==="CLEAR"){
    setUI("clear","All Clear",cameraOn?"Camera detection active":"Safe to walk");
  }
}

// ══════════════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════════════
async function startCamera(){
  if(cameraOn)return;
  speak("Starting camera. Please wait.",true);
  setUI("idle","Starting Camera...","Please wait");
  setCamPill("loading");
  document.getElementById("videoWrap").classList.remove("hidden");

  let stream=null;
  const attempts=[
    {video:{facingMode:{exact:"environment"}},audio:false},
    {video:{facingMode:"environment"},audio:false},
    {video:{width:640,height:480},audio:false},
    {video:true,audio:false}
  ];
  for(const c of attempts){
    try{stream=await navigator.mediaDevices.getUserMedia(c);break;}
    catch(e){
      if(e.name==="NotAllowedError"||e.name==="PermissionDeniedError"){
        speak("Camera permission denied. Tap the lock icon in the address bar, tap Permissions, then allow Camera. Then double tap to try again.",true);
        showErr("❌ Camera permission denied.\n\nFix:\n1. Tap lock icon in Chrome address bar\n2. Tap Permissions → Camera → Allow\n3. Reload page\n4. Double tap to start camera");
        setCamPill("off");
        setUI(bleConnected?"clear":"idle",bleConnected?"Cane Connected":"ANVI Navigation","Camera blocked — see screen");
        return;
      }
    }
  }
  if(!stream){
    speak("Camera could not start. Close other apps using the camera then double tap to try again.",true);
    showErr("❌ Camera unavailable.\nClose other camera apps and double tap to retry.");
    setCamPill("off");
    setUI(bleConnected?"clear":"idle",bleConnected?"Cane Connected":"ANVI Navigation","Camera failed — double tap to retry");
    return;
  }
  try{video.srcObject=stream;await video.play();
    canvas.width=video.videoWidth||480;canvas.height=video.videoHeight||360;
  }catch(e){speak("Camera stream failed. Double tap to try again.",true);setCamPill("off");return;}

  try{
    speak("Camera started. Loading AI model. About 10 seconds.",true);
    setUI("idle","Loading AI...","Almost ready...");
    model=await cocoSsd.load({base:"lite_mobilenet_v2"});
    cameraOn=true;
    setCamPill("on");
    setUI("clear","All Clear",bleConnected?"Camera detection active":"Camera ON");
    speak("Camera is now ON and AI detection is active. I will tell you what is ahead and how far.",true);
    setInterval(()=>{if(cameraOn&&!muted)speak("Camera is still on and scanning.",true);},30000);
    detectLoop();
  }catch(e){
    speak("AI model failed to load. Check your internet connection and double tap to try again.",true);
    showErr("❌ AI model failed.\nCheck internet and double tap to retry.");
    setCamPill("off");cameraOn=false;
  }
}

// ══════════════════════════════════════════════════
// DETECTION LOOP
// ══════════════════════════════════════════════════
async function detectLoop(){
  if(!model||detecting||!cameraOn)return;
  detecting=true;
  try{
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    const preds=await model.detect(canvas);

    const cards=document.getElementById("detCards");
    cards.innerHTML="";

    let danger=[],caution=[];
    let announcements=[];

    preds.forEach(p=>{
      if(p.score<0.55)return;
      const label=p.class;
      const score=Math.round(p.score*100);
      const bboxH=p.bbox[3];
      const distFt=estimateDist(label,bboxH);
      const isDanger =DANGER.includes(label);
      const isCaution=CAUTION.includes(label);
      if(!isDanger&&!isCaution)return;

      // Build card
      const card=document.createElement("div");
      card.className="detCard"+(isDanger?" danger":isCaution?" caution":"");
      card.innerHTML=`<span class="label">${getEmoji(label)} ${label}</span>`+
        `<span class="dist">${distFt!==null?distLabel(distFt):score+"%"}</span>`;
      cards.appendChild(card);

      if(isDanger) danger.push({label,distFt});
      if(isCaution)caution.push({label,distFt});
    });

    // Build announcement
    if(danger.length>0){
      const u=[...new Map(danger.map(d=>[d.label,d])).values()];
      const closest=u.sort((a,b)=>(a.distFt||99)-(b.distFt||99))[0];
      const distStr=closest.distFt!==null?" at "+distLabel(closest.distFt):"";
      if(u.length===1&&u[0].label==="person"){
        announcements.push("Warning — person"+distStr+" ahead");
      }else{
        const names=u.slice(0,2).map(d=>d.label).join(" and ");
        announcements.push("Warning — "+names+distStr+" ahead");
      }
    }
    if(caution.length>0&&danger.length===0){
      const u=[...new Map(caution.map(d=>[d.label,d])).values()];
      const c=u[0];
      const distStr=c.distFt!==null?" at "+distLabel(c.distFt):"";
      announcements.push("Caution — "+c.label+distStr+" nearby");
    }

    if(announcements.length>0)speak(announcements[0]);

  }catch(e){console.warn("Detection:",e);}
  detecting=false;
  setTimeout(detectLoop,1000);
}

// ══════════════════════════════════════════════════
// EMOJI MAP
// ══════════════════════════════════════════════════
function getEmoji(label){
  const m={
    person:"🧍",bicycle:"🚲",car:"🚗",motorcycle:"🏍️",
    bus:"🚌",truck:"🚛",dog:"🐕",cat:"🐈",horse:"🐴",train:"🚆",
    chair:"🪑",couch:"🛋️","dining table":"🍽️",bench:"🪑",
    "potted plant":"🌿",suitcase:"🧳",backpack:"🎒",
    umbrella:"☂️",handbag:"👜",bottle:"🍶",
    "fire hydrant":"🚒",tv:"📺",laptop:"💻",
    refrigerator:"🧊",toilet:"🚽",sink:"🚰",
  };
  return m[label]||"📦";
}

  setCamPill("off");
  setOrbState("idle");
  setTimeout(()=>{
    speak("Welcome to ANVI Navigation. Tap once to connect your cane. Double tap to start camera. Hold to find your cane. Swipe up to mute.",true);
  },800);
};
