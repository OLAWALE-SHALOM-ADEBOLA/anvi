<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ANVI Navigation Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
  <style>
    :root { --green:#00c853;--amber:#ffab00;--red:#d50000;--blue:#2962ff; }
    *{ box-sizing:border-box;margin:0;padding:0;touch-action:manipulation; }
    body{
      background:#000;color:#fff;
      font-family:'Segoe UI',Arial,sans-serif;
      height:100vh;width:100vw;overflow:hidden;
      display:flex;flex-direction:column;user-select:none;
    }
    #touchZone{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      width:100%;padding:20px;gap:16px;transition:background 0.3s;
    }
    #touchZone.clear    {background:#071a0c;}
    #touchZone.warning  {background:#1e1400;}
    #touchZone.emergency{background:#1a0000;animation:blink .5s infinite alternate;}
    #touchZone.finding  {background:#001433;animation:blink .8s infinite alternate;}
    #touchZone.idle     {background:#0a0a0a;}
    @keyframes blink{from{opacity:1}to{opacity:.6}}
    #statusIcon{font-size:80px;line-height:1;}
    #statusText{font-size:26px;font-weight:bold;text-align:center;line-height:1.3;}
    #subText{font-size:15px;color:#aaa;text-align:center;line-height:1.5;max-width:320px;}
    #detOverlay{font-size:16px;color:#aaa;text-align:center;min-height:24px;}
    #camPill{
      display:flex;align-items:center;gap:8px;
      padding:8px 20px;border-radius:30px;
      background:#1a1a1a;border:1.5px solid #333;
      font-size:14px;font-weight:bold;transition:all 0.3s;
    }
    #camPill.off    {border-color:#444;color:#666;}
    #camPill.on     {border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(0,200,83,.3);}
    #camPill.loading{border-color:var(--amber);color:var(--amber);}
    .camDot{width:10px;height:10px;border-radius:50%;background:#444;transition:background .3s;}
    .camDot.on     {background:var(--green);box-shadow:0 0 6px var(--green);animation:cp 1.5s infinite;}
    .camDot.loading{background:var(--amber);animation:cp .5s infinite;}
    @keyframes cp{0%,100%{opacity:1}50%{opacity:.3}}
    #hintBar{
      background:#111;border-top:1px solid #222;
      padding:10px 16px;display:grid;
      grid-template-columns:1fr 1fr;gap:6px;
    }
    .hint{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;padding:4px 0;}
    .hint span:first-child{font-size:16px;min-width:24px;text-align:center;}
    /* Video must be visible (not display:none) for permissions to work */
    #videoWrap{
      position:fixed;bottom:65px;right:8px;
      width:72px;height:54px;border-radius:6px;
      overflow:hidden;border:1px solid #222;
      z-index:5;pointer-events:none;
    }
    #videoWrap.hidden{opacity:0;}
    #video{width:100%;height:100%;object-fit:cover;display:block;}
    #canvas{position:fixed;opacity:0;width:1px;height:1px;top:-100px;}
    #pressRing{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:130px;height:130px;border-radius:50%;
      border:5px solid #40c4ff;opacity:0;
      pointer-events:none;animation:rp 1s infinite;
    }
    #pressRing.active{opacity:1;}
    @keyframes rp{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.15);opacity:.4}}
    #muteIcon{position:fixed;top:14px;right:14px;font-size:22px;opacity:.6;}
    #connDot{
      position:fixed;top:18px;left:14px;
      width:12px;height:12px;border-radius:50%;
      background:#444;transition:background .3s;
    }
    #connDot.connected   {background:var(--green);box-shadow:0 0 8px var(--green);}
    #connDot.disconnected{background:#444;}
    #connDot.scanning    {background:var(--amber);box-shadow:0 0 8px var(--amber);}
    #errBox{
      display:none;position:fixed;bottom:70px;left:10px;right:10px;
      background:#1a0000;border:1px solid var(--red);border-radius:10px;
      padding:12px 16px;font-size:13px;color:#ff6b6b;
      line-height:1.6;z-index:20;white-space:pre-line;
    }
  </style>
</head>
<body>

<div id="videoWrap" class="hidden">
  <video id="video" autoplay playsinline muted></video>
</div>
<canvas id="canvas"></canvas>
<div id="connDot"></div>
<div id="muteIcon">🔊</div>
<div id="pressRing"></div>
<div id="errBox"></div>

<div id="touchZone" class="idle">
  <div id="statusIcon">🦯</div>
  <div id="statusText">ANVI Navigation</div>
  <div id="subText">Tap to connect your cane</div>
  <div id="camPill" class="off">
    <div class="camDot" id="camDot"></div>
    <span id="camPillText">Camera OFF</span>
  </div>
  <div id="detOverlay"></div>
</div>

<div id="hintBar">
  <div class="hint"><span>👆</span><span>Tap — Connect / Status</span></div>
  <div class="hint"><span>👆👆</span><span>Double tap — Start camera</span></div>
  <div class="hint"><span>✋</span><span>Hold — Find cane</span></div>
  <div class="hint"><span>☝️↑</span><span>Swipe up — Mute / Unmute</span></div>
</div>

<script>
const SERVICE_UUID    = "12345678-1234-1234-1234-123456789abc";
const ALERT_CHAR_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";
const CMD_CHAR_UUID   = "dcba4321-ba21-ba21-ba21-fedcba654321";

const DANGER  = ["person","bicycle","car","motorcycle","bus","truck","dog","cat","horse"];
const CAUTION = ["chair","couch","dining table","bench","potted plant","suitcase","backpack","umbrella","handbag","bottle"];

let alertChar=null,cmdChar=null,bleConnected=false;
let model=null,cameraOn=false,detecting=false;
let isFinding=false,muted=false;
let lastSpoken="",lastSpokenAt=0;
const COOLDOWN=4000;
let lastTap=0,tapTimeout=null,pressTimer=null,pressStart=0;
const LONG_PRESS=800;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function showErr(msg){
  const b=document.getElementById("errBox");
  b.textContent=msg; b.style.display="block";
  setTimeout(()=>{b.style.display="none";},8000);
}

function speak(text,force=false){
  if(muted&&!force)return;
  const now=Date.now();
  if(!force&&text===lastSpoken&&now-lastSpokenAt<COOLDOWN)return;
  lastSpoken=text; lastSpokenAt=now;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.0;u.pitch=1.0;u.volume=1.0;
  window.speechSynthesis.speak(u);
}

function setCamPill(state){
  document.getElementById("camPill").className=state;
  document.getElementById("camDot").className="camDot "+state;
  const t=document.getElementById("camPillText");
  if(state==="on")     t.textContent="📷 Camera ON — AI Active";
  if(state==="off")    t.textContent="Camera OFF";
  if(state==="loading")t.textContent="Camera Loading...";
}

function readStatus(){
  let m="";
  m+=bleConnected?"Cane is connected. ":"Cane is not connected. ";
  m+=cameraOn?"Camera and AI detection are ON. ":"Camera is OFF. Double tap to start. ";
  m+=muted?"Voice is muted. Swipe up to unmute.":"Voice is on.";
  speak(m,true);
}

function setUI(zone,icon,title,sub,det=""){
  document.getElementById("touchZone").className=zone;
  document.getElementById("statusIcon").textContent=icon;
  document.getElementById("statusText").textContent=title;
  document.getElementById("subText").textContent=sub;
  document.getElementById("detOverlay").textContent=det;
}

// ── Gestures ──
const zone=document.getElementById("touchZone");
zone.addEventListener("touchstart",e=>{
  pressStart=Date.now();
  pressTimer=setTimeout(triggerLongPress,LONG_PRESS);
  document.getElementById("pressRing").classList.add("active");
},{passive:true});
zone.addEventListener("touchend",e=>{
  clearTimeout(pressTimer);
  document.getElementById("pressRing").classList.remove("active");
  if(Date.now()-pressStart>=LONG_PRESS)return;
  const now=Date.now();
  if(now-lastTap<350){clearTimeout(tapTimeout);lastTap=0;triggerDoubleTap();}
  else{lastTap=now;tapTimeout=setTimeout(()=>{lastTap=0;triggerSingleTap();},350);}
},{passive:true});
zone.addEventListener("touchmove",()=>{
  clearTimeout(pressTimer);
  document.getElementById("pressRing").classList.remove("active");
},{passive:true});

let touchStartY=0;
document.addEventListener("touchstart",e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{
  if(touchStartY-e.changedTouches[0].clientY>60)toggleMute();
},{passive:true});

function triggerSingleTap(){bleConnected?readStatus():connectBLE();}
function triggerDoubleTap(){
  cameraOn
    ?speak("Camera is already on and detecting. I will announce anything I see.",true)
    :startCamera();
}
async function triggerLongPress(){
  if(!bleConnected){speak("Cane not connected. Tap once to connect first.",true);return;}
  isFinding=!isFinding;
  try{
    await cmdChar.writeValue(new TextEncoder().encode(isFinding?"FIND":"FIND_STOP"));
    if(isFinding){
      setUI("finding","🔍","Finding Cane...","Follow the beeping. Hold again to stop.");
      speak("Finding your cane. Follow the beeping. Hold anywhere to stop.",true);
    }else{
      setUI("clear","✅","All Clear",cameraOn?"Camera detection active":"Safe to walk");
      speak("Find mode stopped. Cane is nearby.",true);
    }
  }catch(e){speak("Could not send find command.",true);}
}
function toggleMute(){
  muted=!muted;
  document.getElementById("muteIcon").textContent=muted?"🔇":"🔊";
  muted?window.speechSynthesis.cancel():speak("Voice is on",true);
}

// ── Bluetooth ──
async function connectBLE(){
  if(!navigator.bluetooth){speak("Bluetooth not supported. Please use Chrome on Android.",true);return;}
  try{
    setUI("idle","📡","Scanning...","Looking for ANVI Cane");
    document.getElementById("connDot").className="scanning";
    speak("Scanning for your cane. Please wait.",true);
    const device=await navigator.bluetooth.requestDevice({
      filters:[{name:"ANVI Cane"}],optionalServices:[SERVICE_UUID]
    });
    speak("Cane found. Connecting.",true);
    const server=await device.gatt.connect();
    const service=await server.getPrimaryService(SERVICE_UUID);
    alertChar=await service.getCharacteristic(ALERT_CHAR_UUID);
    await alertChar.startNotifications();
    alertChar.addEventListener("characteristicvaluechanged",e=>{
      handleCaneAlert(new TextDecoder().decode(e.target.value));
    });
    cmdChar=await service.getCharacteristic(CMD_CHAR_UUID);
    bleConnected=true;
    document.getElementById("connDot").className="connected";
    setUI("clear","✅","Cane Connected","Tap for status. Double tap to start camera.");
    speak("Cane connected. Tap to hear your status. Double tap to start camera detection. Hold to find your cane. Swipe up to mute.",true);
    device.addEventListener("gattserverdisconnected",()=>{
      bleConnected=false;
      document.getElementById("connDot").className="disconnected";
      setUI("idle","🦯","Cane Disconnected","Tap to reconnect");
      speak("Cane disconnected. Tap to reconnect.",true);
    });
  }catch(e){
    document.getElementById("connDot").className="disconnected";
    setUI("idle","🦯","Connection Failed","Tap to try again");
    speak("Could not connect. Make sure cane is powered on, then tap to try again.",true);
  }
}

function handleCaneAlert(msg){
  if(isFinding)return;
  const s={
    EMERGENCY:["emergency","🚨","STOP — Obstacle!","Stop walking immediately","Obstacle! Stop now!",true],
    WARNING_CLOSE:["warning","⚠️","Obstacle Very Close","Slow down","Obstacle very close ahead",false],
    WARNING:["warning","⚠️","Obstacle Ahead","Proceed carefully","Obstacle ahead, slow down",false],
    CLEAR:["clear","✅","All Clear",cameraOn?"Camera detection active":"Safe to walk","",false]
  };
  if(!s[msg])return;
  const[zone,icon,title,sub,speech,force]=s[msg];
  setUI(zone,icon,title,sub);
  if(speech)speak(speech,force);
}

// ── Camera ──
async function startCamera(){
  if(cameraOn)return;
  speak("Starting camera. Please wait.",true);
  setUI("idle","📷","Starting Camera...","Please wait");
  setCamPill("loading");

  // Make video visible so browser allows camera
  document.getElementById("videoWrap").classList.remove("hidden");

  let stream=null;
  const attempts=[
    {video:{facingMode:{exact:"environment"}},audio:false},
    {video:{facingMode:"environment"},audio:false},
    {video:{width:640,height:480},audio:false},
    {video:true,audio:false}
  ];

  for(const c of attempts){
    try{
      stream=await navigator.mediaDevices.getUserMedia(c);
      console.log("Camera started with:",JSON.stringify(c));
      break;
    }catch(e){
      console.warn("Attempt failed:",e.name,e.message);
      if(e.name==="NotAllowedError"||e.name==="PermissionDeniedError"){
        // Tell them exactly how to fix it
        speak("Camera permission denied. Open Chrome Settings, go to Site Settings, find Camera, and allow this site. Then double tap to try again.",true);
        showErr("❌ Camera permission denied.\n\nHow to fix:\n1. Tap the lock icon in Chrome address bar\n2. Tap Permissions → Camera → Allow\n3. Reload this page\n4. Double tap to start camera again");
        setCamPill("off");
        setUI(bleConnected?"clear":"idle","🦯",bleConnected?"Cane Connected":"ANVI Navigation","Camera blocked — see screen for fix");
        return;
      }
    }
  }

  if(!stream){
    speak("Camera could not start. Make sure no other app is using the camera, then double tap to try again.",true);
    showErr("❌ Camera unavailable.\n\nClose other apps using the camera.\nThen double tap to try again.");
    setCamPill("off");
    setUI(bleConnected?"clear":"idle","🦯",bleConnected?"Cane Connected":"ANVI Navigation","Camera failed — double tap to retry");
    return;
  }

  try{
    video.srcObject=stream;
    await video.play();
    canvas.width=video.videoWidth||480;
    canvas.height=video.videoHeight||360;
  }catch(e){
    speak("Camera stream failed. Double tap to try again.",true);
    setCamPill("off");
    return;
  }

  try{
    speak("Camera started. Now loading AI model. This takes about 10 seconds.",true);
    setUI("idle","🤖","Loading AI...","Almost ready...");
    model=await cocoSsd.load({base:"lite_mobilenet_v2"});
    cameraOn=true;
    setCamPill("on");
    setUI("clear","✅","All Clear",bleConnected?"Camera detection active":"Camera ON — connect cane too");
    speak("Camera is now ON and AI detection is active. I will announce people and objects ahead of you.",true);
    // Remind every 30 seconds
    setInterval(()=>{if(cameraOn&&!muted)speak("Camera is still on and scanning.",true);},30000);
    detectLoop();
  }catch(e){
    speak("AI model failed to load. Check your internet connection and double tap to try again.",true);
    showErr("❌ AI model failed.\n\nCheck internet and double tap to try again.");
    setCamPill("off");
    cameraOn=false;
  }
}

// ── Detection ──
async function detectLoop(){
  if(!model||detecting||!cameraOn)return;
  detecting=true;
  try{
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    const preds=await model.detect(canvas);
    let danger=[],caution=[];
    preds.forEach(p=>{
      if(p.score<0.60)return;
      if(DANGER.includes(p.class)) danger.push(p.class);
      if(CAUTION.includes(p.class))caution.push(p.class);
    });
    if(danger.length>0){
      const u=[...new Set(danger)];
      speak(u.length===1&&u[0]==="person"?"Warning — person detected ahead":"Warning — "+u.slice(0,2).join(" and ")+" ahead");
    }else if(caution.length>0){
      speak("Caution — "+[...new Set(caution)][0]+" nearby");
    }
    const all=[...new Set([...danger,...caution])];
    document.getElementById("detOverlay").textContent=all.length>0?all.join(" | "):"";
  }catch(e){console.warn("Detection:",e);}
  detecting=false;
  setTimeout(detectLoop,1000);
}

window.onload=()=>{
  setCamPill("off");
  setTimeout(()=>{
    speak("Welcome to ANVI Navigation. Tap once to connect your cane. Double tap to start camera. Hold to find your cane. Swipe up to mute.",true);
  },800);
};
</script>
</body>
</html>
